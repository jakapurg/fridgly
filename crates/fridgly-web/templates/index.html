{% extends "base.html" %}

{% block content %}
<div class="topbar">
    <h1>Fridgly</h1>
    <div class="topbar-actions">
        <button class="fab fab-scan" type="button" onclick="openScanner()" aria-label="{{ t.scan }}">
            <span aria-hidden="true">▮▮</span>
        </button>
        <button class="fab" type="button" onclick="openSheet()" aria-label="{{ t.add_item }}">+</button>
    </div>
</div>

<div class="search-bar">
    <input class="input search-input" type="search" name="q" placeholder="{{ t.search }}"
           autocomplete="off" aria-label="{{ t.search }}"
           hx-get="/items/search"
           hx-trigger="input changed delay:200ms, search"
           hx-target="#fridge-list"
           hx-swap="outerHTML">
</div>

<div class="legend">
    <span><span class="dot dot-expired"></span>{{ t.leg_expired }}</span>
    <span><span class="dot dot-soon"></span>{{ t.leg_2d }}</span>
    <span><span class="dot dot-week"></span>{{ t.leg_week }}</span>
    <span><span class="dot dot-later"></span>{{ t.leg_later }}</span>
</div>

{% include "list.html" %}
{% endblock %}

{% block overlay %}
<div id="sheet-overlay" class="sheet-overlay" onclick="closeSheet()"></div>
<div id="add-sheet" class="sheet" role="dialog" aria-modal="true" aria-label="{{ t.add_item }}">
    <div class="sheet-handle"></div>
    <div class="sheet-title">{{ t.add_item }}</div>
    <form id="add-form"
          hx-post="/items"
          hx-target="#fridge-list"
          hx-swap="outerHTML"
          hx-on::after-request="if(event.detail.successful){ this.reset(); resetSheetControls(); closeSheet(); }">
        <div class="field">
            <label for="add-name">{{ t.name }}</label>
            <input id="add-name" class="input" type="text" name="name" placeholder="{{ t.name }}"
                   autocomplete="off" required>
            <input id="add-category" type="hidden" name="category">
        </div>
        <div class="field">
            <label>{{ t.quantity }}</label>
            <div class="qty-row">
                <div class="stepper">
                    <button type="button" onclick="stepQty(this, -1)" aria-label="–">–</button>
                    <input class="input qty-input" type="text" name="quantity" value="1"
                           aria-label="{{ t.quantity }}" onfocus="this.select()">
                    <button type="button" onclick="stepQty(this, 1)" aria-label="+">+</button>
                </div>
                <input class="input unit-input" type="text" name="unit" placeholder="{{ t.unit }}"
                       aria-label="{{ t.unit }}" autocomplete="off">
            </div>
        </div>
        <div class="field">
            <label>{{ t.subunit }}</label>
            <div class="qty-row">
                <input class="input sub-qty-input" type="text" name="subunit_remaining"
                       inputmode="numeric" placeholder="{{ t.left }}" aria-label="{{ t.subunit }}"
                       autocomplete="off">
                <input class="input" type="text" name="subunit_unit" placeholder="{{ t.subunit_unit }}"
                       aria-label="{{ t.subunit_unit }}" autocomplete="off">
            </div>
        </div>
        <div class="field">
            <label>{{ t.expires }}</label>
            <div class="chip-row" data-expiry-group>
                <button type="button" class="chip" data-days="0" onclick="pickExpiry(this)">{{ t.today }}</button>
                <button type="button" class="chip" data-days="3" onclick="pickExpiry(this)">{{ t.plus_3d }}</button>
                <button type="button" class="chip" data-days="7" onclick="pickExpiry(this)">{{ t.plus_1wk }}</button>
                <button type="button" class="chip" data-days="30" onclick="pickExpiry(this)">{{ t.plus_1mo }}</button>
                <button type="button" class="chip" data-pick onclick="pickDate(this)">{{ t.pick_date }}</button>
            </div>
            <input class="input date-input hidden" type="date" name="expiry_date" aria-label="{{ t.expires }}">
        </div>
        <button type="submit" class="save-btn">{{ t.add_to_fridge }}</button>
    </form>
</div>

<div id="scan-overlay" class="sheet-overlay" onclick="closeScanner()"></div>
<div id="scan-sheet" class="sheet scan-sheet" role="dialog" aria-modal="true" aria-label="{{ t.scan_title }}"
     data-msg-scanning="{{ t.scan_hint }}"
     data-msg-looking="{{ t.scan_looking }}"
     data-msg-notfound="{{ t.scan_notfound }}"
     data-msg-error="{{ t.scan_error }}"
     data-msg-unsupported="{{ t.scan_unsupported }}">
    <div class="sheet-handle"></div>
    <div class="sheet-title">{{ t.scan_title }}</div>
    <div class="scan-viewport">
        <video id="scan-video" playsinline muted></video>
        <div class="scan-reticle"></div>
    </div>
    <p id="scan-status" class="scan-status">{{ t.scan_hint }}</p>
    <form class="scan-manual" onsubmit="submitManualBarcode(event)">
        <label for="scan-input" class="scan-manual-label">{{ t.scan_manual }}</label>
        <div class="scan-manual-row">
            <input id="scan-input" class="input" type="text" inputmode="numeric" pattern="[0-9]*"
                   name="barcode" placeholder="{{ t.enter_barcode }}" autocomplete="off">
            <button type="submit" class="save-btn small">{{ t.lookup }}</button>
        </div>
    </form>
</div>
{% endblock %}
