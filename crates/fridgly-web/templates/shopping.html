{% extends "base.html" %}
{% import "macros.html" as m %}

{% block content %}
<div class="topbar">
    <h1>{{ t.shopping_list }}</h1>
    <div class="topbar-actions">
        {% call m::lang_switch(t.lang) %}
        <button class="fab" type="button" disabled style="opacity:.3" aria-label="+">+</button>
    </div>
</div>

<div class="section-title">{{ t.running_low }}</div>
<div class="placeholder">
    <div class="big">🛒</div>
    {{ t.shopping_blurb }}
    <div><span class="badge-soon">{{ t.coming_soon }}</span></div>
</div>
{% endblock %}
